<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Restaurante POS & KDS</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=POS&background=4F46E5&color=fff&size=192" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="POS Restaurante" />
  </head>
  <body>
    <div id="error-container" style="display: none; padding: 20px; background: #fee2e2; color: #991b1b; font-family: monospace; white-space: pre-wrap; word-break: break-all; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var container = document.getElementById('error-container');
        container.style.display = 'block';
        container.innerText += 'Error: ' + message + '\nSource: ' + source + ':' + lineno + ':' + colno + '\n\n';
        if (error && error.stack) container.innerText += error.stack + '\n\n';
      };
      window.onunhandledrejection = function(event) {
        var container = document.getElementById('error-container');
        container.style.display = 'block';
        container.innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n\n';
        if (event.reason && event.reason.stack) container.innerText += event.reason.stack + '\n\n';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
